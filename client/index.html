<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <span class="pulse-dot"></span>
                <h1>Event Catalog</h1>
            </div>
            <p class="subtitle">Real-time client-server event logging system</p>
        </header>

        <main class="grid-layout">
            <section class="card form-card">
                <div class="card-header">
                    <h2>Add an Event</h2>
                    <p>Enter details below to publish a new event.</p>
                </div>
                <form>
                    <div class="input-group">
                        <label for="title">Title of Event:</label>
                        <input id="title" type="text" placeholder="e.g. Afternoon Coding Sprint" required autocomplete="off" />
                    </div>
                    <button type="submit" class="btn-submit">
                        <span>Publish Event</span>
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </form>
            </section>

            <section class="card list-card">
                <div class="card-header">
                    <h2>All Events</h2>
                    <p>Displaying all active and incoming events.</p>
                </div>
                <div class="list-wrapper">
                    <ul id="event-list"></ul>
                </div>
            </section>
        </main>
    </div>
    <script src="./script.js"></script>
</body>
</html>
